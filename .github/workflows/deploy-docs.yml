name: Deploy Docs

# Manual trigger to deploy documentation for any tag (past or present)
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy documentation for (e.g. v1.2.3)"
        required: true

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy-docs:
    name: Deploy documentation for ${{ github.event.inputs.tag }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download currently-deployed site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p site
          ARTIFACT_ID=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?name=github-pages&per_page=5" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .id // empty')
          if [ -n "$ARTIFACT_ID" ]; then
            echo "Restoring previous site from artifact $ARTIFACT_ID"
            gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > pages.zip
            unzip -p pages.zip artifact.tar | tar -xz -C site/ || true
            rm -f pages.zip
            echo "Restored $(find site -maxdepth 1 -mindepth 1 | wc -l) top-level entries"
          else
            echo "No previous artifact — starting fresh"
          fi

      - name: Build all versioned documentation
        run: |
          TAG="${{ github.event.inputs.tag }}"

          # Collect stable v1+ tags, newest first
          ALL_TAGS=$(git tag -l 'v[0-9]*' | sort -V -r | grep -v -E '\-(alpha|beta|rc)' | awk -F'[v.]' '{if ($2+0 >= 1) print}')

          LATEST_STABLE=$(echo "$ALL_TAGS" | head -1)
          echo "Latest stable: $LATEST_STABLE"

          # Build each versioned dir from its own tag commit
          echo "$ALL_TAGS" | while read -r VER; do
            echo "Building docs for $VER"
            mkdir -p "site/$VER"
            git checkout "$VER" -- docs/
            cp -r docs/* "site/$VER/"
            sed -i "s|%%VERSION%%|$VER|g" "site/$VER/index.html"
            git checkout HEAD -- docs/
          done

          # Root = latest stable tag content
          git checkout "$LATEST_STABLE" -- docs/
          cp -r docs/* site/
          sed -i "s|%%VERSION%%|$LATEST_STABLE|g" site/index.html
          git checkout HEAD -- docs/

          # Always use HEAD versions.html everywhere (contains navigation fixes)
          cp docs/versions.html site/versions.html

          # Build versions.json — strip pre-release siblings when releasing stable
          IS_PRERELEASE=false
          if echo "$TAG" | grep -qE '\-(alpha|beta|rc)'; then
            IS_PRERELEASE=true
          fi
          if [ "$IS_PRERELEASE" = "false" ]; then
            VERSION_BASE=$(echo "$TAG" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')
            FILTERED_TAGS=$(echo "$ALL_TAGS" | grep -v -E "^${VERSION_BASE}-(alpha|beta|rc)")
          else
            FILTERED_TAGS="$ALL_TAGS"
          fi
          ALL_TAGS_JSON=$(echo "$FILTERED_TAGS" | jq -R . | jq -s .)
          jq -n \
            --arg latest "$LATEST_STABLE" \
            --argjson versions "$ALL_TAGS_JSON" \
            '{latest: $latest, versions: $versions}' > site/versions.json

          # Propagate versions.json and latest versions.html into every versioned dir
          echo "$ALL_TAGS" | while read -r VER; do
            cp site/versions.json "site/$VER/versions.json"
            cp docs/versions.html "site/$VER/versions.html"
          done

          echo "Site structure (top-level):"
          ls site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
