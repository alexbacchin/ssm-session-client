name: Deploy GitHub Pages

on:
  # Deploy automatically when a release is published
  release:
    types: [published]
  # Allow manual triggers with an optional version override
  workflow_dispatch:
    inputs:
      version:
        description: "Version label to display (e.g. v1.2.3). Leave empty to fetch from GitHub API at runtime."
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Only one concurrent deployment; cancel any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Build versioned documentation
        run: |
          # Determine the version tag
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then TAG="${{ inputs.version }}"; fi
          if [ -z "$TAG" ]; then
            REF="${{ github.ref_name }}"
            if echo "$REF" | grep -qE '^v[0-9]'; then TAG="$REF"; fi
          fi

          # Create a working directory for the site
          mkdir -p site

          # Copy current docs to root (latest version)
          cp -r docs/* site/

          # If we have a version tag, also create a versioned copy
          if [ -n "$TAG" ]; then
            echo "Building versioned documentation for $TAG"
            mkdir -p "site/$TAG"
            cp -r docs/* "site/$TAG/"

            # Inject version into both root and versioned docs
            sed -i "s|%%VERSION%%|$TAG|g" site/index.html
            sed -i "s|%%VERSION%%|$TAG|g" "site/$TAG/index.html"

            # Build versions list from git tags (all version tags)
            echo "Building versions list from git tags"
            ALL_TAGS=$(git tag -l 'v[0-9]*' | sort -V -r | jq -R . | jq -s .)

            # Fallback: if no tags, at least include the current tag
            if [ -z "$ALL_TAGS" ] || [ "$ALL_TAGS" = "[]" ]; then
              ALL_TAGS=$(jq -n --arg tag "$TAG" '[$tag]')
            fi

            echo "Creating versions index"
            jq -n --arg latest "$TAG" --argjson versions "$ALL_TAGS" '{latest: $latest, versions: $versions}' > site/versions.json
            echo "Generated versions.json:"
            cat site/versions.json
          else
            echo "No version tag — deploying as latest without versioning"
            sed -i "s|%%VERSION%%|latest|g" site/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
