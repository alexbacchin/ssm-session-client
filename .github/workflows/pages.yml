name: Deploy GitHub Pages

on:
  # Deploy automatically when a release is published
  release:
    types: [published]
  # Allow manual triggers with an optional version override
  workflow_dispatch:
    inputs:
      version:
        description: "Version label to display (e.g. v1.2.3). Leave empty to fetch from GitHub API at runtime."
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Only one concurrent deployment; cancel any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Build versioned documentation
        run: |
          # Determine the version tag being deployed
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then TAG="${{ inputs.version }}"; fi
          if [ -z "$TAG" ]; then
            REF="${{ github.ref_name }}"
            if echo "$REF" | grep -qE '^v[0-9]'; then TAG="$REF"; fi
          fi

          # Create a working directory for the site
          mkdir -p site

          # Copy current docs (will be used for versioned copy and possibly root)
          cp -r docs/* site/

          # If we have a version tag, also create a versioned copy
          if [ -n "$TAG" ]; then
            echo "Building versioned documentation for $TAG"
            mkdir -p "site/$TAG"
            cp -r docs/* "site/$TAG/"
            sed -i "s|%%VERSION%%|$TAG|g" "site/$TAG/index.html"

            # Get all version tags and separate stable from pre-release
            echo "Building versions list from git tags"
            ALL_TAGS=$(git tag -l 'v[0-9]*' | sort -V -r)

            # Find latest stable release (no -alpha, -beta, -rc suffix)
            LATEST_STABLE=$(echo "$ALL_TAGS" | grep -v -E '\-(alpha|beta|rc)' | head -1)

            # If no stable found, use the latest pre-release
            if [ -z "$LATEST_STABLE" ]; then
              LATEST_STABLE=$(echo "$ALL_TAGS" | head -1)
            fi

            echo "Latest stable release: $LATEST_STABLE"
            echo "Current tag: $TAG"

            # Determine what version should be at root (latest stable)
            ROOT_VERSION="$LATEST_STABLE"
            if [ -z "$ROOT_VERSION" ]; then
              ROOT_VERSION="$TAG"
            fi

            echo "Root documentation will point to: $ROOT_VERSION"

            # Set root docs to latest stable
            if [ "$ROOT_VERSION" = "$TAG" ]; then
              # Current tag is the latest stable, update root
              sed -i "s|%%VERSION%%|$TAG|g" site/index.html
            else
              # Current tag is pre-release, use latest stable for root
              sed -i "s|%%VERSION%%|$ROOT_VERSION|g" site/index.html
              # Also create root copy if not already present
              if [ ! -f "site/index.html" ]; then
                cp -r docs/* site/
                sed -i "s|%%VERSION%%|$ROOT_VERSION|g" site/index.html
              fi
            fi

            # Build versions.json with all versions
            ALL_TAGS_JSON=$(echo "$ALL_TAGS" | jq -R . | jq -s .)

            echo "Creating versions index"
            jq -n \
              --arg latest "$ROOT_VERSION" \
              --argjson versions "$ALL_TAGS_JSON" \
              '{latest: $latest, versions: $versions}' > site/versions.json

            echo "Generated versions.json:"
            cat site/versions.json
          else
            echo "No version tag — deploying as latest without versioning"
            sed -i "s|%%VERSION%%|latest|g" site/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
